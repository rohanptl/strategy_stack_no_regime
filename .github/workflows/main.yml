name: Wealthfront Allocate + Email

on:
  workflow_dispatch:
    inputs:
      top_k:
        description: "Number of ETFs to target"
        required: false
        default: "5"
      export_prefix:
        description: "Output file prefix"
        required: false
        default: "wealthfront_alloc"

  schedule:
    - cron: "0 13 * * 0"

jobs:
  allocate-and-email:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      SCRIPT_PATH: strategy_stack_no_regime.py
      UNIVERSE_FILE: WealthfrontETFs.txt
      HOLDINGS_FILE: holdings.csv
      DEFAULT_TOP_K: 5
      DEFAULT_EXPORT_PREFIX: wealthfront_alloc
      GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      PERSONAL_EMAIL: ${{ secrets.PERSONAL_EMAIL }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance openpyxl tabulate

      - name: Resolve runtime parameters
        id: params
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "top_k=${{ inputs.top_k }}" >> "$GITHUB_OUTPUT"
            echo "export_prefix=${{ inputs.export_prefix }}" >> "$GITHUB_OUTPUT"
          else
            echo "top_k=${DEFAULT_TOP_K}" >> "$GITHUB_OUTPUT"
            echo "export_prefix=${DEFAULT_EXPORT_PREFIX}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create output folder
        run: mkdir -p out

      - name: Run allocation in allocate mode
        run: |
          python "$SCRIPT_PATH" \
            --mode allocate \
            --universe "$UNIVERSE_FILE" \
            --holdings "$HOLDINGS_FILE" \
            --top-k "${{ steps.params.outputs.top_k }}" \
            --export-prefix "out/${{ steps.params.outputs.export_prefix }}"

      - name: Build email body and collect attachments
        run: |
          python - <<'PY'
          import glob
          import html
          import os
          from datetime import datetime
      
          import pandas as pd
      
          out_dir = "out"
          csvs = sorted(glob.glob(os.path.join(out_dir, "*.csv")))
          if not csvs:
              raise SystemExit("No CSV files were generated in out/")
      
          # Prefer rebalance/action output first, then legacy allocation file if present
          rebalance_candidates = [
              p for p in csvs
              if p.endswith("_rebalance_actions.csv") or p.endswith("_allocation_changes.csv")
          ]
          metrics_candidates = [
              p for p in csvs
              if p.endswith("_full_metrics.csv") or p.endswith("_metrics_targets.csv")
          ]
      
          rebalance_file = rebalance_candidates[-1] if rebalance_candidates else None
          metrics_file = metrics_candidates[-1] if metrics_candidates else None
      
          actions = pd.read_csv(rebalance_file) if rebalance_file else pd.DataFrame()
          metrics = pd.read_csv(metrics_file) if metrics_file else pd.DataFrame()
      
          def normalize_columns(df: pd.DataFrame) -> pd.DataFrame:
              if df.empty:
                  return df
      
              rename_map = {}
              for c in df.columns:
                  cl = c.strip().lower()
                  if cl == "ticker":
                      rename_map[c] = "ticker"
                  elif cl == "sleeve":
                      rename_map[c] = "sleeve"
                  elif cl == "entry_label":
                      rename_map[c] = "entry_label"
                  elif cl == "action":
                      rename_map[c] = "action"
                  elif cl == "rationale":
                      rename_map[c] = "rationale"
                  elif cl in ("current_alloc_%", "current_alloc_pct", "current allocation %"):
                      rename_map[c] = "current_alloc"
                  elif cl in ("target_alloc_%", "target_alloc_pct", "target allocation %"):
                      rename_map[c] = "target_alloc"
                  elif cl in ("model_target_alloc_%", "model_target_alloc_pct"):
                      rename_map[c] = "model_target_alloc"
                  elif cl in ("change_%pts", "delta_pct_points", "change_pct_points"):
                      rename_map[c] = "delta_pts"
              return df.rename(columns=rename_map)
      
          actions = normalize_columns(actions)
          metrics = normalize_columns(metrics)
      
          # If the rebalance file is missing, fall back to metrics if it has action columns
          if actions.empty and not metrics.empty and {"ticker", "action"}.issubset(metrics.columns):
              actions = metrics.copy()
      
          for col in ["current_alloc", "target_alloc", "model_target_alloc", "delta_pts"]:
              if col in actions.columns:
                  actions[col] = pd.to_numeric(actions[col], errors="coerce")
      
          def fmt_pct(v):
              if pd.isna(v):
                  return ""
              return f"{float(v):.2f}%"
      
          def html_table(df: pd.DataFrame, columns: list[str]) -> str:
              if df.empty:
                  return "<p><i>None</i></p>"
      
              present_cols = [c for c in columns if c in df.columns]
              out = df[present_cols].copy()
      
              for c in ["current_alloc", "target_alloc", "model_target_alloc", "delta_pts"]:
                  if c in out.columns:
                      out[c] = out[c].map(fmt_pct)
      
              # Escape string columns for safety/readability
              for c in out.columns:
                  if out[c].dtype == object:
                      out[c] = out[c].fillna("").map(lambda x: html.escape(str(x)))
      
              return out.to_html(index=False, border=0, justify="left", escape=False)
      
          actionable = pd.DataFrame()
          increase_df = pd.DataFrame()
          decrease_df = pd.DataFrame()
          watch_df = pd.DataFrame()
      
          if not actions.empty:
              if "delta_pts" in actions.columns:
                  actions["abs_delta_pts"] = actions["delta_pts"].abs()
      
              # Actionable now
              increase_df = actions[actions.get("action", "").astype(str).str.upper().eq("INCREASE")].copy()
              decrease_df = actions[actions.get("action", "").astype(str).str.upper().eq("DECREASE")].copy()
      
              # Not actionable now, but selected/watchlist names
              if "entry_label" in actions.columns:
                  watch_df = actions[
                      actions["entry_label"].astype(str).str.upper().eq("WAIT FOR PULLBACK")
                  ].copy()
      
              if not increase_df.empty and "abs_delta_pts" in increase_df.columns:
                  increase_df = increase_df.sort_values("abs_delta_pts", ascending=False)
      
              if not decrease_df.empty and "abs_delta_pts" in decrease_df.columns:
                  decrease_df = decrease_df.sort_values("abs_delta_pts", ascending=False)
      
              if not watch_df.empty and "model_target_alloc" in watch_df.columns:
                  watch_df = watch_df.sort_values("model_target_alloc", ascending=False)
      
              actionable = pd.concat([increase_df, decrease_df], ignore_index=True)
      
          run_url = (
              os.environ.get("GITHUB_SERVER_URL", "https://github.com")
              + "/"
              + os.environ.get("GITHUB_REPOSITORY", "")
              + "/actions/runs/"
              + os.environ.get("GITHUB_RUN_ID", "")
          )
      
          generated_at = datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
      
          total_increase = increase_df["delta_pts"].clip(lower=0).sum() if "delta_pts" in increase_df.columns and not increase_df.empty else 0.0
          total_decrease = (-decrease_df["delta_pts"].clip(upper=0).sum()) if "delta_pts" in decrease_df.columns and not decrease_df.empty else 0.0
      
          summary_bits = []
          if not increase_df.empty:
              summary_bits.append(f"<b>Buy / increase:</b> {len(increase_df)} ETF(s), total +{total_increase:.2f} pts")
          if not decrease_df.empty:
              summary_bits.append(f"<b>Sell / decrease:</b> {len(decrease_df)} ETF(s), total -{total_decrease:.2f} pts")
          if not watch_df.empty:
              summary_bits.append(f"<b>Watchlist / wait for pullback:</b> {len(watch_df)} ETF(s)")
          if not summary_bits:
              summary_bits.append("No rebalance actions were identified.")
      
          summary_html = "<br>".join(summary_bits)
      
          increase_table = html_table(
              increase_df.head(10),
              ["ticker", "sleeve", "current_alloc", "target_alloc", "delta_pts", "entry_label", "rationale"],
          )
          decrease_table = html_table(
              decrease_df.head(10),
              ["ticker", "sleeve", "current_alloc", "target_alloc", "delta_pts", "entry_label", "rationale"],
          )
          watch_table = html_table(
              watch_df.head(10),
              ["ticker", "sleeve", "model_target_alloc", "entry_label", "rationale"],
          )
      
          metrics_note = (
              f"<p><b>Metrics file:</b> {html.escape(os.path.basename(metrics_file))}</p>"
              if metrics_file else ""
          )
          rebalance_note = (
              f"<p><b>Rebalance file:</b> {html.escape(os.path.basename(rebalance_file))}</p>"
              if rebalance_file else ""
          )
      
          body = f"""
          <html>
            <body style="font-family: Arial, sans-serif; font-size: 14px; color: #222;">
              <p><b>Wealthfront allocation run completed.</b></p>
      
              <p>
                <b>Generated at:</b> {generated_at}<br>
                <b>Repository:</b> {html.escape(os.environ.get("GITHUB_REPOSITORY", ""))}<br>
                <b>Run:</b> <a href="{html.escape(run_url)}">{html.escape(run_url)}</a>
              </p>
      
              <h3>Rebalance summary</h3>
              <p>{summary_html}</p>
      
              <h3>Action now: Buy / Increase</h3>
              {increase_table}
      
              <h3>Action now: Sell / Decrease</h3>
              {decrease_table}
      
              <h3>Selected, but wait for pullback</h3>
              {watch_table}
      
              {rebalance_note}
              {metrics_note}
      
              <p><b>Attached:</b> all generated CSV artifacts from this run.</p>
            </body>
          </html>
          """
      
          with open("email_body.html", "w", encoding="utf-8") as f:
              f.write(body)
      
          with open("attachments.txt", "w", encoding="utf-8") as f:
              for path in csvs:
                  f.write(path + "\n")
          PY
