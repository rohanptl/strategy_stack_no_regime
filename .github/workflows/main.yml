name: Wealthfront Allocate + Email

on:
  workflow_dispatch:
    inputs:
      top_k:
        description: "Number of ETFs to target"
        required: false
        default: "5"
      export_prefix:
        description: "Output file prefix"
        required: false
        default: "wealthfront_alloc"

  schedule:
    # Every Sunday at 13:00 UTC = 9:00 AM America/New_York during EDT
    - cron: "0 13 * * 0"

jobs:
  allocate-and-email:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      SCRIPT_PATH: strategy_stack_no_regime.py
      UNIVERSE_FILE: WealthfrontETFs.txt
      HOLDINGS_FILE: holdings.csv
      DEFAULT_TOP_K: 5
      DEFAULT_EXPORT_PREFIX: wealthfront_alloc
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance openpyxl

      - name: Resolve runtime parameters
        id: params
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "top_k=${{ inputs.top_k }}" >> $GITHUB_OUTPUT
            echo "export_prefix=${{ inputs.export_prefix }}" >> $GITHUB_OUTPUT
          else
            echo "top_k=${DEFAULT_TOP_K}" >> $GITHUB_OUTPUT
            echo "export_prefix=${DEFAULT_EXPORT_PREFIX}" >> $GITHUB_OUTPUT
          fi

      - name: Create output folder
        run: mkdir -p out

      - name: Run allocation in allocate mode
        run: |
          python "$SCRIPT_PATH" \
            --mode allocate \
            --universe "$UNIVERSE_FILE" \
            --holdings "$HOLDINGS_FILE" \
            --top-k "${{ steps.params.outputs.top_k }}" \
            --export-prefix "out/${{ steps.params.outputs.export_prefix }}"

      - name: Build email body and collect attachments
        run: |
          python - <<'PY'
          import glob
          import html
          import os
          import pandas as pd
          from datetime import datetime

          out_dir = "out"
          csvs = sorted(glob.glob(os.path.join(out_dir, "*.csv")))
          if not csvs:
              raise SystemExit("No CSV files were generated in out/")

          allocation_candidates = [
              p for p in csvs if p.endswith("_allocation_changes.csv")
          ]
          metrics_candidates = [
              p for p in csvs
              if p.endswith("_full_metrics.csv") or p.endswith("_metrics_targets.csv")
          ]

          allocation_file = allocation_candidates[-1] if allocation_candidates else None
          metrics_file = metrics_candidates[-1] if metrics_candidates else None

          alloc = pd.read_csv(allocation_file) if allocation_file else pd.DataFrame()

          rename_map = {}
          for c in alloc.columns:
              cl = c.strip().lower()
              if cl in ("ticker",):
                  rename_map[c] = "ticker"
              elif cl in ("action",):
                  rename_map[c] = "action"
              elif cl in ("current_alloc_%", "current_alloc_pct", "current allocation %"):
                  rename_map[c] = "current_alloc"
              elif cl in ("target_alloc_%", "target_alloc_pct", "target allocation %"):
                  rename_map[c] = "target_alloc"
              elif cl in ("change_%pts", "delta_pct_points", "change_pct_points"):
                  rename_map[c] = "delta_pts"

          if not alloc.empty:
              alloc = alloc.rename(columns=rename_map)

          if not alloc.empty and "delta_pts" in alloc.columns:
              alloc["delta_pts_abs"] = pd.to_numeric(alloc["delta_pts"], errors="coerce").abs()
              summary_df = alloc.sort_values("delta_pts_abs", ascending=False).head(10).copy()
          else:
              summary_df = alloc.head(10).copy()

          preferred_cols = [c for c in ["ticker", "action", "current_alloc", "target_alloc", "delta_pts"] if c in summary_df.columns]
          if preferred_cols:
              summary_df = summary_df[preferred_cols]

          def fmt_percent(v):
              try:
                  return f"{float(v):.2f}%"
              except Exception:
                  return ""

          for c in ["current_alloc", "target_alloc", "delta_pts"]:
              if c in summary_df.columns:
                  summary_df[c] = summary_df[c].map(fmt_percent)

          run_url = (
              os.environ.get("GITHUB_SERVER_URL", "https://github.com")
              + "/"
              + os.environ.get("GITHUB_REPOSITORY", "")
              + "/actions/runs/"
              + os.environ.get("GITHUB_RUN_ID", "")
          )

          generated_at = datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
          table_html = (
              summary_df.to_html(index=False, border=0, justify="left")
              if not summary_df.empty
              else "<p>No allocation rows were found in the generated CSV output.</p>"
          )

          metrics_note = f"<p><b>Metrics file:</b> {html.escape(os.path.basename(metrics_file))}</p>" if metrics_file else ""

          body = f"""
          <html>
            <body style="font-family: Arial, sans-serif; font-size: 14px; color: #222;">
              <p>Wealthfront allocation run completed.</p>
              <p><b>Generated at:</b> {generated_at}</p>
              <p><b>Repository:</b> {html.escape(os.environ.get("GITHUB_REPOSITORY", ""))}<br>
                 <b>Run:</b> <a href="{html.escape(run_url)}">{html.escape(run_url)}</a></p>
              <h3>Top allocation changes</h3>
              {table_html}
              {metrics_note}
              <p>Attached: all generated CSV artifacts from this run.</p>
            </body>
          </html>
          """

          with open("email_body.html", "w", encoding="utf-8") as f:
              f.write(body)

          with open("attachments.txt", "w", encoding="utf-8") as f:
              for path in csvs:
                  f.write(path + "\n")
          PY

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wealthfront-allocate-artifacts
          path: |
            out/*.csv
            email_body.html
          if-no-files-found: error
          retention-days: 14

      - name: Send Gmail with inline summary + attachments
        run: |
          python - <<'PY'
          import os
          import smtplib
          from email.message import EmailMessage
          from mimetypes import guess_type

          sender = os.environ["GMAIL_USERNAME"]
          password = os.environ["GMAIL_APP_PASSWORD"]
          recipient = os.environ["EMAIL_TO"]

          subject = "Wealthfront weekly allocation report"
          if os.environ.get("GITHUB_EVENT_NAME") == "workflow_dispatch":
              subject = "Wealthfront manual allocation test report"

          with open("email_body.html", "r", encoding="utf-8") as f:
              html_body = f.read()

          msg = EmailMessage()
          msg["Subject"] = subject
          msg["From"] = sender
          msg["To"] = recipient
          msg.set_content("Your email client does not support HTML. See attached CSV artifacts.")
          msg.add_alternative(html_body, subtype="html")

          with open("attachments.txt", "r", encoding="utf-8") as f:
              attachment_paths = [line.strip() for line in f if line.strip()]

          for path in attachment_paths:
              ctype, encoding = guess_type(path)
              if ctype is None or encoding is not None:
                  maintype, subtype = "application", "octet-stream"
              else:
                  maintype, subtype = ctype.split("/", 1)
              with open(path, "rb") as af:
                  msg.add_attachment(
                      af.read(),
                      maintype=maintype,
                      subtype=subtype,
                      filename=os.path.basename(path)
                  )

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as smtp:
              smtp.login(sender, password)
              smtp.send_message(msg)
          PY
